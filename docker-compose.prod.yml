services:
  influxdb:
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    restart: always

  postgres:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  simulator:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    restart: always

  api:
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: always
    ports: []

  frontend:
    restart: always

  nginx:
    ports:
      - "80:80"
      - "443:443"
    restart: always
