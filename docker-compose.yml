services:
  influxdb:
    image: influxdb:2.7
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: adminpassword
      DOCKER_INFLUXDB_INIT_ORG: drone-lab
      DOCKER_INFLUXDB_INIT_BUCKET: drone_telemetry
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: dev-token
    volumes:
      - influxdb_data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drone_twin
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: drone_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drone -d drone_twin"]
      interval: 10s
      timeout: 5s
      retries: 5

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dev-token
      INFLUXDB_ORG: drone-lab
      INFLUXDB_BUCKET: drone_telemetry
      SIMULATOR_INTERVAL_MS: 500
      SIMULATOR_DRONE_ID: stmu-quad-001
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      influxdb:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: drone_twin
      POSTGRES_USER: drone
      POSTGRES_PASSWORD: drone_dev
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: dev-token
      INFLUXDB_ORG: drone-lab
      INFLUXDB_BUCKET: drone_telemetry
      API_HOST: 0.0.0.0
      API_PORT: 8000
      SAFETY_FACTOR_THRESHOLD: 1.5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
        VITE_WS_URL: ws://localhost:8000/ws
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  influxdb_data:
  postgres_data:
