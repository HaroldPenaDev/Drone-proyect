services:
  simulator:
    build:
      context: ./simulator
    volumes:
      - ./simulator/src:/app/src
    environment:
      SIMULATOR_INTERVAL_MS: 1000

  api:
    build:
      context: ./api
    volumes:
      - ./api/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: builder
    volumes:
      - ./frontend/src:/build/src
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000/ws
